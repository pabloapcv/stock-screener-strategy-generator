name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff
        run: ruff check src main.py

  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Import check
        run: python -c "from src.pipeline import ScreeningPipeline; from src.ideas.generator import generate_ideas"

      - name: Stage 1 pipeline smoke test
        run: python main.py run --stage 1 --tickers AAPL,MSFT --no-save
        timeout-minutes: 10
