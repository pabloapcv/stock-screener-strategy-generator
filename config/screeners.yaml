# Multi-stage stock screening pipeline configuration
# Mirrors the TradingView + external verification workflow

universe:
  # Starting universe: S&P 500 + NASDAQ 100 overlap removed
  sources:
    - sp500
    - nasdaq100

screener_1_institutional_growth:
  name: "Institutional Growth Leaders"
  description: "Companies institutions accumulate for medium-term swing trades"
  filters:
    analyst_rating_min: 4.0          # Strong Buy (1=Sell, 5=Strong Buy on most scales)
    market_cap_min: 5_000_000_000    # $5B
    revenue_growth_min: 0.20         # 20% TTM YoY
    eps_growth_min: 0.20             # 20% TTM YoY
    roe_min: 0.15                    # 15%
    relative_volume_min: 1.2
    avg_volume_min: 2_000_000
    price_min: 20.0
    beta_min: 1.0
    beta_max: 2.5
  technicals:
    price_above_sma_50: true
    price_above_sma_200: true
    sma_50_above_sma_200: true
    rsi_min: 50
    rsi_max: 70
    within_pct_of_52w_high: 0.10     # Within 10% of 52-week high
  expected_output: "30-80 stocks"

screener_2_analyst_momentum:
  name: "Analyst Upgrade Momentum"
  description: "Names attracting analyst attention with upgrade momentum"
  filters:
    analyst_rating_min: 4.0
    relative_volume_min: 1.5
    performance_1w_min: 0.03         # 3%
    performance_1m_min: 0.08           # 8%
    revenue_growth_min: 0.20
    eps_growth_min: 0.20
  external_checks:
  # Manual verification sources (flagged in output for review)
    - analyst_upgrades_30d      # MarketBeat
    - eps_estimate_revisions    # Seeking Alpha / Finviz
    - price_target_increases    # TipRanks
    - insider_buying            # OpenInsider
  expected_output: "~15-20 stocks"

screener_3_options_liquidity:
  name: "High-Quality Options Candidates"
  description: "Execution-quality names with liquid option chains"
  filters:
    market_cap_min: 5_000_000_000
    avg_volume_min: 2_000_000
    price_min: 20.0
    beta_min: 1.0
    relative_volume_min: 1.0
  options:
    weekly_expirations: true
    atm_open_interest_min: 1000
    daily_option_volume_min: 500
    bid_ask_spread_pct_max: 0.05     # < 5% of premium
    iv_rank_buy_min: 20
    iv_rank_buy_max: 50
    iv_rank_sell_min: 50
    iv_rank_sell_max: 80
  expected_output: "~8 stocks"

screener_4_technical_entry:
  name: "Technical Entry Setup"
  description: "High-conviction entry setups from narrowed universe"
  signals:
    - pullback_to_sma_20
    - pullback_to_sma_50
    - breakout_from_consolidation
    - relative_strength_vs_spy
    - volume_confirmation
  expected_output: "2-5 trades"

scoring:
  weights:
    analyst_rating: 0.25
    eps_revision_trend: 0.20
    revenue_growth: 0.20
    technical_momentum: 0.15
    relative_volume: 0.10
    options_liquidity: 0.10

pipeline:
  top_n_final: 20
  cache_ttl_minutes: 60
  parallel_workers: 4

paper_trading:
  starting_capital: 100_000
  default_contracts: 1
  default_shares: 10
  max_position_pct: 0.10    # max 10% of portfolio per trade
  auto_stop_target: true

ideas:
  max_ideas: 10
  default_dte: 21          # Target days to expiration for swing trades
  min_dte: 7
  min_oi_for_ideas: 100    # Minimum ATM open interest to suggest options trades
  iv_buy_max: 50            # Below this → debit strategies (calls, spreads)
  iv_sell_min: 50           # Above this → credit strategies (put spreads, CSP)

daily:
  max_ideas: 10             # Ideas to generate each morning
  max_new_trades: 3         # Max new paper trades to open per run
  email_enabled: true       # Send morning report to EMAIL_TO in .env
